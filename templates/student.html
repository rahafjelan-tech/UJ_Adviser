<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a4a6e" />
  <title>المساعد الأكاديمي — طالب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    .chat-page { flex: 1; min-height: 0; overflow: hidden; }
    .chat-main { height: 100%; overflow: hidden; display: flex; flex-direction: column; padding: 1.25rem; box-sizing: border-box; }
    .chat-messages { flex: 1; min-height: 0; overflow-y: scroll; }
    .sidebar { background: #0a4b65 !important; }
    .sidebar-brand img { border-radius: 8px; }
  </style>
</head>
<body>

  <header class="mobile-bar" aria-label="شريط التنقل">
    <button type="button" class="menu-toggle" id="menuToggle" aria-expanded="false" aria-controls="sidebar">☰</button>
    <span class="mobile-bar-title">المساعد الأكاديمي</span>
    <img src="{{ url_for('static', filename='assets/logo-uj.svg') }}" alt="" class="mobile-bar-logo" width="36" height="36" />
  </header>

  <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

  <div class="chat-page">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <img src="{{ url_for('static', filename='assets/logo-uj.svg') }}" alt="جامعة جدة" />
          <span class="sidebar-brand-text">  </span>
        </div>
        <nav class="sidebar-menu" aria-label="القائمة">
          <span class="menu-item active" aria-current="page">محادثة</span>
        </nav>
      </div>
      <div class="sidebar-bottom">
        <a href="/" class="menu-item logout-btn">تسجيل خروج</a>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <h1>المساعد الأكاديمي</h1>
        <p></p>
      </header>

      <section class="chat-messages" id="chatMessages" aria-live="polite">
        <div class="message bot">
          <div class="message-bubble">
            أهلًا 👋 أنا مساعدك الأكاديمي. كيف أقدر أساعدك اليوم؟
          </div>
        </div>
      </section>

      <form class="chat-input-area" id="chatForm">
        <input type="text" id="chatInput" placeholder="اكتب سؤالك هنا..." autocomplete="off" enterkeyhint="send" />
        <button type="submit">إرسال</button>
      </form>
    </main>
  </div>

  <script>
  (function () {
    var toggle = document.getElementById("menuToggle");
    var sidebar = document.getElementById("sidebar");
    var backdrop = document.getElementById("sidebarBackdrop");
    function setOpen(open) {
      sidebar.classList.toggle("is-open", open);
      backdrop.classList.toggle("is-open", open);
      backdrop.setAttribute("aria-hidden", open ? "false" : "true");
      toggle.setAttribute("aria-expanded", open ? "true" : "false");
      document.body.style.overflow = open ? "hidden" : "";
    }
    toggle.addEventListener("click", function () { setOpen(!sidebar.classList.contains("is-open")); });
    backdrop.addEventListener("click", function () { setOpen(false); });
    window.addEventListener("resize", function () { if (window.innerWidth > 768) setOpen(false); });
  })();

  const chatForm     = document.getElementById("chatForm");
  const chatInput    = document.getElementById("chatInput");
  const chatMessages = document.getElementById("chatMessages");

  function formatText(text) {
    let t = String(text)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
    t = t.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    t = t.replace(/(^|\n)(\d+)\. /g, "$1<br><b>$2.</b> ");
    t = t.replace(/(^|\n)[-•] /g, "$1<br>• ");
    t = t.replace(/\n\n/g, "<br><br>");
    t = t.replace(/\n/g, "<br>");
    t = t.replace(/^(<br>)+/, "");
    return t;
  }

  function appendMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = "message " + sender;
    const bubble = document.createElement("div");
    bubble.className = "message-bubble";
    bubble.innerHTML = sender === "bot" ? formatText(text) : String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    msg.appendChild(bubble);
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  chatForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    const text = chatInput.value.trim();
    if (!text) return;
    appendMessage(text, "user");
    chatInput.value = "";
    appendMessage("جاري معالجة السؤال...", "bot");
    try {
      const res  = await fetch("/student", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      chatMessages.removeChild(chatMessages.lastChild);
      appendMessage(data.reply || "لم يتم إرجاع رد من الخادم.", "bot");
    } catch (err) {
      chatMessages.removeChild(chatMessages.lastChild);
      appendMessage("تعذر الاتصال بالخادم.", "bot");
    }
  });
  </script>
</body>
</html>
